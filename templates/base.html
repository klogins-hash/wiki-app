<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Wiki{% endblock %}</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            --radius: 8px;
            --max-width: 960px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── layout ── */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar .subtitle {
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .sidebar nav h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 16px 0 8px;
        }

        .sidebar nav a {
            display: block;
            padding: 4px 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.15s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar nav a:hover {
            color: var(--accent);
            background: var(--bg-hover);
        }

        .sidebar .stats {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar .stats span {
            display: inline-block;
            margin-right: 12px;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 32px 48px;
            max-width: calc(100vw - var(--sidebar-width));
        }

        /* ── page content ── */
        .page-content {
            max-width: var(--max-width);
        }

        .page-content h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .page-content h2 { font-size: 24px; margin: 24px 0 12px; }
        .page-content h3 { font-size: 20px; margin: 20px 0 8px; }
        .page-content h4 { font-size: 16px; margin: 16px 0 8px; }

        .page-content p { margin-bottom: 16px; }

        .page-content a {
            color: var(--accent);
            text-decoration: none;
        }
        .page-content a:hover { text-decoration: underline; }

        .page-content a.wikilink {
            color: var(--accent-purple);
            border-bottom: 1px dashed var(--accent-purple);
        }
        .page-content a.wikilink:hover {
            border-bottom-style: solid;
        }

        .page-content code {
            font-family: var(--font-mono);
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .page-content pre {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .page-content pre code {
            background: none;
            padding: 0;
        }

        .page-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .page-content ul, .page-content ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .page-content li { margin-bottom: 4px; }

        .page-content table {
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }

        .page-content th, .page-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .page-content th {
            background: var(--bg-card);
            font-weight: 600;
        }

        .page-content img {
            max-width: 100%;
            border-radius: var(--radius);
        }

        .page-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        /* ── meta sections ── */
        .meta-section {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .meta-section h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .backlinks-list, .history-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .backlinks-list a, .history-preview a {
            display: inline-block;
            padding: 4px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.15s;
        }

        .backlinks-list a:hover, .history-preview a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .commit-meta {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── page list ── */
        .page-list { list-style: none; }

        .page-list li {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .page-list li:last-child { border-bottom: none; }

        .page-list a {
            color: var(--accent);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }

        .page-list a:hover { text-decoration: underline; }

        .page-list .meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── stats cards ── */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── history table ── */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th, .history-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 14px;
        }

        .history-table th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .history-table .sha {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        .history-table .author {
            color: var(--accent-green);
        }

        .history-table .author.ai-agent {
            color: var(--accent-purple);
        }

        /* ── graph embed ── */
        .graph-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .graph-container svg {
            width: 100%;
            height: 100%;
        }

        /* ── raw content toggle ── */
        .raw-toggle {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-dim);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 16px;
        }

        .raw-toggle:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .raw-content {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            white-space: pre-wrap;
            margin-bottom: 16px;
        }

        /* ── utility ── */
        .search-box {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .search-box:focus { outline: none; border-color: var(--accent); }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .empty-state h2 { font-size: 24px; margin-bottom: 8px; color: var(--text-dim); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 16px; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h1><a href="/" style="color: var(--text); text-decoration: none;">📖 AI Wiki</a></h1>
            <div class="subtitle">Agent-maintained knowledge base</div>
            <nav>
                <h3>Pages</h3>
                {% block sidebar_pages %}
                {% endblock %}
            </nav>
            <div class="stats">
                <span>📄 {{ stats.total_pages if stats else '?' }} pages</span>
                <span>🔗 {{ stats.total_links if stats else '?' }} links</span>
                <br>
                <span style="margin-top:4px;display:inline-block;">🐙 git-backed · api-first</span>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
